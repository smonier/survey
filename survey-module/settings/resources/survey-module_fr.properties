svymix_component=Composant Sondage

svy_survey=Sondage
svy_survey.description=Description
svy_survey.description.ui.tooltip=<b>Description</b> — introduction ou instructions optionnelles affichées sous le titre.
svy_survey.active=Actif
svy_survey.active.ui.tooltip=<b>Actif</b> — décocher pour masquer le sondage sans le supprimer.
svy_survey.timerEnabled=Activer le minuteur
svy_survey.timerEnabled.ui.tooltip=<b>Activer le minuteur</b> — lorsqu'activé, le sondage n'accepte les réponses qu'entre les dates de début et de fin.
svy_survey.startDate=Date de début
svy_survey.startDate.ui.tooltip=<b>Date de début</b> — date et heure à partir desquelles les réponses sont acceptées. Ignoré si le minuteur est désactivé.
svy_survey.endDate=Date de fin
svy_survey.endDate.ui.tooltip=<b>Date de fin</b> — fermeture automatique : le formulaire se ferme à cette date et les résultats deviennent visibles pour tous les visiteurs.

svy_question=Question
svy_question.text=Description
svy_question.text.ui.tooltip=<b>Description</b> — contexte ou instructions optionnels affichés sous le titre de la question. Laisser vide si le titre est suffisamment explicite.
svy_question.allowMultiple=Autoriser plusieurs réponses
svy_question.allowMultiple.ui.tooltip=<b>Autoriser plusieurs réponses</b> — coché : les participants peuvent sélectionner plusieurs options (cases à cocher). Non coché : une seule option possible (boutons radio).

svy_answerOption=Option de réponse
svy_answerOption.text=Description
svy_answerOption.text.ui.tooltip=<b>Description</b> — précision optionnelle affichée sous le libellé de l'option. Laisser vide si le titre est suffisant.

svy_surveyResponse=Réponse au sondage
svy_questionResponse=Réponse à la question

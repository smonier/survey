svymix_component=Survey Component

svy_survey=Survey
svy_survey.description=Description
svy_survey.description.ui.tooltip=<b>Description</b> — optional introduction or instructions shown below the title.
svy_survey.active=Active
svy_survey.active.ui.tooltip=<b>Active</b> — uncheck to hide the survey from visitors without deleting it.
svy_survey.timerEnabled=Enable Timer
svy_survey.timerEnabled.ui.tooltip=<b>Enable Timer</b> — when checked, the survey only accepts responses between the start and end dates.
svy_survey.startDate=Start Date
svy_survey.startDate.ui.tooltip=<b>Start Date</b> — date and time from which responses are accepted. Ignored when the timer is disabled.
svy_survey.endDate=End Date
svy_survey.endDate.ui.tooltip=<b>End Date</b> — hard cutoff: the form closes automatically at this date and results become visible to all visitors.

svy_question=Question
svy_question.text=Description
svy_question.text.ui.tooltip=<b>Description</b> — optional context or instructions shown below the question title. Leave blank if the title is self-explanatory.
svy_question.allowMultiple=Allow Multiple Answers
svy_question.allowMultiple.ui.tooltip=<b>Allow Multiple Answers</b> — when checked, participants can select more than one option (checkboxes). Otherwise only one option is selectable (radio buttons).

svy_answerOption=Answer Option
svy_answerOption.jcr_title=Answer
svy_answerOption.text=Description
svy_answerOption.text.ui.tooltip=<b>Description</b> — optional clarification shown below the option label. Leave blank if the title is sufficient.

svy_surveyResponse=Survey Response
svy_questionResponse=Question Response
